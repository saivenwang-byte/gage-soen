# Render — 单服务：API + 前端 H5（同域 /api）
services:
  - type: web
    name: gage-soen
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run render:build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATA_SOURCE
        value: curated
      - key: SERVE_FRONTEND
        value: "1"
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: "1"
